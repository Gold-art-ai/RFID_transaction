<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Nexus | Consolidated System Data</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #05070a;
            color: #cbd5e1;
        }

        .neon-border-white {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body class="min-h-screen pb-10">

    <div
        class="w-full bg-slate-900/50 border-b border-white/5 py-3 px-6 flex justify-between items-center backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-black tracking-tighter text-white">RFID<span
                    class="text-white italic opacity-80"></span></h1>
            <span
                class="text-[10px] mono text-slate-500 uppercase tracking-widest bg-white/10 px-2 py-1 rounded border border-white/20 text-slate-300">Admin
                Console</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/5">
                <span id="conn-status-dot" class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                <span id="conn-status-text"
                    class="text-[10px] font-bold uppercase tracking-widest text-red-500">Offline</span>
            </div>
            <a href="/"
                class="text-xs font-bold text-slate-400 hover:text-white transition-colors bg-white/5 px-4 py-1.5 rounded-full border border-white/10 hover:bg-white/10 uppercase tracking-widest">Logout</a>
        </div>
    </div>

    <main class="container mx-auto px-6 py-8 max-w-6xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-black/40 border border-white/10 rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-indigo-500/10 rounded-full blur-xl"></div>
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Total System Top-Ups
                </h3>
                <p id="stat-topups" class="text-3xl font-black text-white mono">0 <span
                        class="text-sm text-indigo-400">RWF</span></p>
            </div>
            <div class="bg-black/40 border border-white/10 rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-cyan-500/10 rounded-full blur-xl"></div>
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Total Sales Revenue</h3>
                <p id="stat-sales" class="text-3xl font-black text-white mono">0 <span
                        class="text-sm text-cyan-400">RWF</span></p>
            </div>
            <div class="bg-black/40 border border-white/10 rounded-2xl p-6 relative overflow-hidden">
                <div class="absolute -right-4 -top-4 w-24 h-24 bg-emerald-500/10 rounded-full blur-xl"></div>
                <h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Live Transactions Today
                </h3>
                <p id="stat-txns" class="text-3xl font-black text-white mono">0</p>
            </div>
        </div>

        <div class="neon-border-white glass-dark rounded-[2rem] p-8 shadow-2xl">
            <div class="flex items-center gap-3 mb-6 border-b border-white/5 pb-4">
                <div class="p-2 bg-white/10 rounded-lg"><svg class="w-6 h-6 text-slate-300" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path
                            d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z">
                        </path>
                    </svg></div>
                <h3 class="text-xl font-bold text-white tracking-wide">Live Transaction Ledger</h3>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-left mono text-sm">
                    <thead class="text-slate-400 border-b border-white/10 text-xs uppercase tracking-widest">
                        <tr>
                            <th class="pb-3 pl-2">Time</th>
                            <th class="pb-3">Type</th>
                            <th class="pb-3">Card UID</th>
                            <th class="pb-3 text-right">Amount (RWF)</th>
                            <th class="pb-3 text-right pr-2">Status</th>
                        </tr>
                    </thead>
                    <tbody id="ledger-body">
                        <!-- Initial state empty -->
                        <tr class="text-slate-600 text-center" id="empty-state">
                            <td colspan="5" class="py-12 text-xs">Waiting for live transactions...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script>
        const socket = io(`http://${window.location.hostname}:5001`);

        let stats = { topups: 0, sales: 0, count: 0 };

        socket.on('update_ui', (data) => {
            if (data.type === 'TOP-UP' || data.type === 'PAYMENT') {
                document.getElementById('empty-state')?.remove();

                stats.count++;
                if (data.type === 'TOP-UP') stats.topups += data.amount;
                if (data.type === 'PAYMENT') stats.sales += data.amount;

                document.getElementById('stat-topups').innerHTML = `${stats.topups.toLocaleString()} <span class="text-sm text-indigo-400">RWF</span>`;
                document.getElementById('stat-sales').innerHTML = `${stats.sales.toLocaleString()} <span class="text-sm text-cyan-400">RWF</span>`;
                document.getElementById('stat-txns').innerText = stats.count;

                addToLedger(data);
            }
        });

        function addToLedger(data) {
            const row = document.createElement('tr');
            row.className = `border-b border-white/5 transition-all duration-500 hover:bg-white/5 ${data.type === 'TOP-UP' ? "text-indigo-300" : "text-cyan-300"}`;

            const typePillClass = data.type === 'TOP-UP'
                ? 'bg-indigo-500/20 border-indigo-500/30 text-indigo-400'
                : 'bg-cyan-500/20 border-cyan-500/30 text-cyan-400';

            const amountPrefix = data.type === 'TOP-UP' ? '+' : '-';

            row.innerHTML = `
                <td class="py-4 pl-2 opacity-60 text-xs">${data.time || new Date().toLocaleTimeString()}</td>
                <td class="py-4"><span class="px-2 py-1 border rounded text-[10px] font-bold ${typePillClass}">${data.type}</span></td>
                <td class="py-4 font-bold tracking-wider">${data.uid}</td>
                <td class="py-4 text-right font-black text-[15px]">${amountPrefix}${data.amount.toLocaleString()}</td>
                <td class="py-4 text-right pr-2"><div class="inline-flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400"></span><span class="text-emerald-400 text-[10px] font-bold">SUCCESS</span></div></td>
            `;
            document.getElementById('ledger-body').prepend(row);
        }

        socket.on('connect', () => {
            document.getElementById('conn-status-dot').className = "w-2 h-2 bg-slate-200 rounded-full";
            document.getElementById('conn-status-text').innerText = "System Live";
            document.getElementById('conn-status-text').className = "text-[10px] font-bold text-slate-300";
        });
    </script>
</body>

</html>
