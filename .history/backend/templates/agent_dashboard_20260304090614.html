<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID Nexus | Agent Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #05070a;
            color: #cbd5e1;
        }

        .neon-border-indigo {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.2);
            border: 1px solid rgba(99, 102, 241, 0.4);
        }

        .glass-dark {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>

<body class="min-h-screen pb-10">

    <div
        class="w-full bg-slate-900/50 border-b border-white/5 py-3 px-6 flex justify-between items-center backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <h1 class="text-lg font-black tracking-tighter text-white">RFID<span
                    class="text-indigo-400 italic">NEXUS</span></h1>
            <span
                class="text-[10px] mono text-slate-500 uppercase tracking-widest bg-indigo-500/10 px-2 py-1 rounded border border-indigo-500/20 text-indigo-400">Agent
                View</span>
        </div>
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/5">
                <span id="conn-status-dot" class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
                <span id="conn-status-text"
                    class="text-[10px] font-bold uppercase tracking-widest text-red-500">Offline</span>
            </div>
            <a href="/"
                class="text-xs font-bold text-slate-400 hover:text-white transition-colors bg-white/5 px-4 py-1.5 rounded-full border border-white/10 hover:bg-white/10 uppercase tracking-widest">Logout</a>
        </div>
    </div>

    <main class="container mx-auto px-6 py-12 max-w-2xl">
        <section class="neon-border-indigo glass-dark p-8 rounded-[2rem] space-y-6">
            <div class="flex items-center gap-3 border-b border-white/5 pb-4">
                <div class="p-2 bg-indigo-500/20 rounded-lg"><svg class="w-6 h-6 text-indigo-400" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                    </svg></div>
                <h2 class="text-2xl font-bold text-white">Wallet Top-Up Facility</h2>
            </div>
            <div class="space-y-6 mt-6">
                <div class="flex gap-4">
                    <div class="bg-black/30 p-5 rounded-2xl border border-white/5 flex-1">
                        <label class="text-[10px] mono text-slate-500 uppercase tracking-widest mb-1 block">Active Card
                            UID</label>
                        <p id="admin-uid" class="text-lg mono text-white truncate font-bold">--- --- ---</p>
                    </div>
                    <div class="bg-black/30 p-5 rounded-2xl border border-white/5 flex-1 text-right">
                        <label class="text-[10px] mono text-slate-500 uppercase tracking-widest mb-1 block">Current
                            Balance</label>
                        <p id="admin-prev-balance" class="text-2xl mono text-indigo-400 font-black">0 RWF</p>
                    </div>
                </div>

                <div class="bg-black/20 p-6 rounded-2xl border border-indigo-500/10">
                    <label class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 block">Top-Up Amount
                        (RWF)</label>
                    <input type="number" id="topup-amount" placeholder="e.g. 5000"
                        class="w-full bg-black/50 border border-indigo-500/30 rounded-xl py-4 px-6 text-2xl text-white focus:outline-none focus:border-indigo-400 font-bold mb-4 placeholder:text-slate-700">

                    <button onclick="handleTransaction('/topup', 'topup-amount', 'admin-uid')"
                        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-black uppercase tracking-widest text-sm py-4 rounded-xl transition-all shadow-[0_0_20px_rgba(79,70,229,0.3)]">
                        Execute Top-Up
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const socket = io(`http://${window.location.hostname}:5001`);

        socket.on('update_ui', (data) => {
            document.getElementById('admin-uid').innerText = data.uid;
            document.getElementById('admin-prev-balance').innerText = data.balance.toLocaleString() + " RWF";
        });

        async function handleTransaction(endpoint, inputId, uidId) {
            const uid = document.getElementById(uidId).innerText;
            const inputEl = document.getElementById(inputId);
            const amountVal = inputEl.value;

            if (uid === "--- --- ---" || !amountVal || parseInt(amountVal) <= 0) {
                alert("🚨 Please scan card & enter valid amount!");
                return;
            }

            try {
                const response = await fetch(`http://${window.location.hostname}:5001${endpoint}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ uid: uid, amount: parseInt(amountVal) })
                });
                const res = await response.json();

                if (response.ok) {
                    alert(`✅ Top-Up Success! New Balance: ${res.new_balance} RWF`);
                    inputEl.value = '';
                } else {
                    alert(`❌ Error: ${res.error}`);
                }
            } catch (err) {
                alert("📡 Connection error: Check if backend is running.");
            }
        }

        socket.on('connect', () => {
            document.getElementById('conn-status-dot').className = "w-2 h-2 bg-indigo-400 rounded-full";
            document.getElementById('conn-status-text').innerText = "System Live";
            document.getElementById('conn-status-text').className = "text-[10px] font-bold text-indigo-400";
        });
    </script>
</body>

</html>
