<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RFID PIXEL | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: #cbd5e1; }
        .neon-border-cyan { box-shadow: 0 0 10px rgba(34, 211, 238, 0.2); border: 1px solid rgba(34, 211, 238, 0.3); }
        .neon-border-indigo { box-shadow: 0 0 15px rgba(99, 102, 241, 0.2); border: 1px solid rgba(99, 102, 241, 0.4); }
        .neon-text-cyan { text-shadow: 0 0 8px rgba(34, 211, 238, 0.5); color: #22d3ee; }
        .glass-dark { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .role-card { transition: all 0.3s ease; }
        .role-card:hover { transform: translateY(-5px); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-slate-900 via-[#05070a] to-black">
    <div class="glass-dark p-12 rounded-[2rem] neon-border-cyan max-w-5xl w-full shadow-2xl">
        <div class="text-center mb-12">
            <h1 class="text-4xl font-black tracking-tighter text-white mb-2">RFID<span class="neon-text-cyan italic">PIXEL</span></h1>
            <p class="text-xs mono text-slate-500 uppercase tracking-widest mt-2 border border-slate-700 inline-block px-3 py-1 rounded-full bg-slate-800/50">Select Identification Protocol</p>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Agent -->
            <a href="/agent_dashboard" class="role-card flex flex-col items-center justify-center p-10 bg-black/40 neon-border-indigo rounded-3xl hover:bg-indigo-900/30 group text-center border border-indigo-500/30 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-indigo-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="p-5 bg-indigo-500/20 rounded-full mb-6 group-hover:bg-indigo-500/40 transition-colors group-hover:scale-110 duration-300">
                    <svg class="w-10 h-10 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-white mb-3">Agent</h2>
                <p class="text-xs mono text-indigo-300/70">Wallet Top-Up Access</p>
            </a>

            <!-- Salesperson -->
            <a href="/sales_dashboard" class="role-card flex flex-col items-center justify-center p-10 bg-black/40 neon-border-cyan rounded-3xl hover:bg-cyan-900/30 group text-center border border-cyan-500/30 relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-cyan-500/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="p-5 bg-cyan-500/20 rounded-full mb-6 group-hover:bg-cyan-500/40 transition-colors group-hover:scale-110 duration-300">
                    <svg class="w-10 h-10 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-white mb-3">Salesperson</h2>
                <p class="text-xs mono text-cyan-300/70">POS & Fulfillment Access</p>
            </a>

            <!-- Admin -->
            <a href="/consolidated_dashboard" class="role-card flex flex-col items-center justify-center p-10 bg-black/40 rounded-3xl hover:bg-white/10 group text-center border border-white/10 shadow-[0_0_20px_rgba(255,255,255,0.03)] relative overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-b from-white/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <div class="p-5 bg-white/10 rounded-full mb-6 group-hover:bg-white/20 transition-colors group-hover:scale-110 duration-300">
                    <svg class="w-10 h-10 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                </div>
                <h2 class="text-2xl font-bold text-white mb-3">Admin</h2>
                <p class="text-xs mono text-slate-400">System Analytics Console</p>
            </a>
        </div>
    </div>
</body>
</html>
